<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup - Side-Kik</title>
    <link rel="stylesheet" href="../static/css/main.css">
    <link rel="stylesheet" href="../static/css/profile-setup.css">
    <style>
        .bio-feedback {
            margin-top: 10px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        
        .bio-feedback.good {
            background-color: #e6f7e6;
            border: 1px solid #28a745;
        }
        
        .bio-feedback.poor {
            background-color: #fff3e6;
            border: 1px solid #fd7e14;
        }
        
        .feedback-list {
            margin-top: 10px;
            padding-left: 20px;
        }
        
        .analyze-bio-btn {
            background-color: #4a6cf7;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .analyze-bio-btn:hover {
            background-color: #3a5bd9;
        }
    </style>
</head>
<body>
    <div class="profile-setup-container">
        <h2>Complete Your Freelancer Profile</h2>
        <form id="profileForm">
            <label for="bio">Bio:</label>
            <textarea id="bio" name="bio" required></textarea>
            <button type="button" id="analyzeBioBtn" class="analyze-bio-btn">Check Bio Quality</button>
            
            <div id="bioFeedback" class="bio-feedback">
                <h4 id="feedbackTitle">Bio Quality Analysis</h4>
                <p id="overallAssessment"></p>
                <ul id="feedbackList" class="feedback-list"></ul>
            </div>

            <label for="skills">Skills:</label>
            <input type="text" id="skills" name="skills" required>

            <label for="availability">Availability:</label>
            <select id="availability" name="availability">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>

            <label for="experience">Experience (years):</label>
            <input type="number" id="experience" name="experience" required>

            <label for="rate">Hourly Rate:</label>
            <input type="number" id="rate" name="rate" required>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script type="module">
        import CONFIG from "../static/js/config.js";
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";  
    
        // ✅ Initialize Supabase
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        // Bio quality analysis functionality
        const analyzeBioBtn = document.getElementById("analyzeBioBtn");
        const bioInput = document.getElementById("bio");
        const bioFeedback = document.getElementById("bioFeedback");
        const feedbackTitle = document.getElementById("feedbackTitle");
        const overallAssessment = document.getElementById("overallAssessment");
        const feedbackList = document.getElementById("feedbackList");
        
        if (analyzeBioBtn) {
            analyzeBioBtn.addEventListener("click", async function() {
                try {
                    const bioText = bioInput.value.trim();
                    
                    if (!bioText) {
                        alert("Please enter your bio first.");
                        return;
                    }
                    
                    // Show loading state
                    analyzeBioBtn.textContent = "Analyzing...";
                    analyzeBioBtn.disabled = true;
                    
                    // Send request to analyze bio
                    const response = await fetch("/check_bio_quality", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ bio: bioText })
                    });
                    
                    if (!response.ok) {
                        throw new Error("Failed to analyze bio");
                    }
                    
                    const analysis = await response.json();
                    
                    // Reset button
                    analyzeBioBtn.textContent = "Check Bio Quality";
                    analyzeBioBtn.disabled = false;
                    
                    // Display feedback
                    bioFeedback.style.display = "block";
                    bioFeedback.className = "bio-feedback " + (analysis.is_good_quality ? "good" : "poor");
                    
                    feedbackTitle.textContent = analysis.is_good_quality 
                        ? "Bio Quality: Good" 
                        : "Bio Quality: Needs Improvement";
                        
                    overallAssessment.textContent = analysis.overall_assessment;
                    
                    // Clear previous feedback
                    feedbackList.innerHTML = "";
                    
                    // Add feedback items
                    if (analysis.feedback && analysis.feedback.length > 0) {
                        analysis.feedback.forEach(item => {
                            const li = document.createElement("li");
                            li.textContent = item;
                            feedbackList.appendChild(li);
                        });
                    } else {
                        const li = document.createElement("li");
                        li.textContent = "No specific suggestions - your bio looks good!";
                        feedbackList.appendChild(li);
                    }
                    
                } catch (error) {
                    console.error("Error analyzing bio:", error);
                    alert("Failed to analyze bio. Please try again later.");
                    
                    // Reset button
                    analyzeBioBtn.textContent = "Check Bio Quality";
                    analyzeBioBtn.disabled = false;
                }
            });
        }
        
        // Bio input change listener to hide feedback when bio is modified
        bioInput.addEventListener("input", function() {
            bioFeedback.style.display = "none";
        });
    
        document.getElementById("profileForm").addEventListener("submit", async function(event) {
            event.preventDefault();
    
            // ✅ Refresh session before fetching user
            await supabase.auth.refreshSession();
            
            // ✅ Get logged-in user
            const { data: user, error: userError } = await supabase.auth.getUser();
            if (!user || !user.user) {
                alert("Unauthorized: Please log in again.");
                return;
            }
    
            const userId = user.user.id;  // ✅ Get authenticated user ID
            const fullName = user.user.user_metadata.full_name;  // ✅ Get full name from metadata
            const skillsInput = document.getElementById("skills").value.trim();
            const availabilityInput = document.getElementById("availability").value.toLowerCase();
    
            if (availabilityInput !== "yes" && availabilityInput !== "no") {
                alert("Invalid availability value. Must be 'yes' or 'no'.");
                return;
            }
            
            const bioText = document.getElementById("bio").value.trim();
            
            // Check bio quality before submitting
            try {
                const response = await fetch("/check_bio_quality", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ bio: bioText })
                });
                
                if (response.ok) {
                    const analysis = await response.json();
                    
                    // If bio quality is poor, ask for confirmation before submitting
                    if (!analysis.is_good_quality) {
                        const confirmSubmit = confirm(
                            "Your bio could be improved to increase your chances of being matched with clients. " +
                            "Would you like to review and improve your bio before submitting?\n\n" +
                            "Click 'OK' to go back and improve your bio, or 'Cancel' to submit anyway."
                        );
                        
                        if (confirmSubmit) {
                            // Show feedback and return without submitting
                            bioFeedback.style.display = "block";
                            bioFeedback.className = "bio-feedback poor";
                            feedbackTitle.textContent = "Bio Quality: Needs Improvement";
                            overallAssessment.textContent = analysis.overall_assessment;
                            
                            // Clear previous feedback
                            feedbackList.innerHTML = "";
                            
                            // Add feedback items
                            if (analysis.feedback && analysis.feedback.length > 0) {
                                analysis.feedback.forEach(item => {
                                    const li = document.createElement("li");
                                    li.textContent = item;
                                    feedbackList.appendChild(li);
                                });
                            }
                            
                            return;
                        }
                    }
                }
            } catch (error) {
                console.error("Error checking bio quality before submission:", error);
                // Continue with submission even if bio check fails
            }
    
            const data = {
                id: userId,  
                bio: bioText,
                skills: skillsInput ? skillsInput.split(",").map(skill => skill.trim()) : [],  // ✅ Convert to array
                availability: availabilityInput,  
                experience: parseInt(document.getElementById("experience").value, 10) || 0,
                rate: parseFloat(document.getElementById("rate").value) || 0.0,
                education: "",  
                version: 1  
            };
    
            try {
                console.log("🚀 Sending Data to Supabase:", data);  

                // ✅ First, generate embedding on server
                const embedResponse = await fetch("/generate_profile_embedding", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        bio: data.bio,
                        skills: data.skills
                    })
                });

                if (!embedResponse.ok) {
                    console.error("❌ Embedding generation failed");
                    alert("Error generating profile embedding. Please try again.");
                    return;
                }

                const embedResult = await embedResponse.json();
                data.embedding = embedResult.embedding;

                 // ✅ Fix: Use upsert to prevent duplicate key errors
                const { error: upsertError } = await supabase
                    .from("freelancer_profiles")
                        .upsert([data], { onConflict: ["id"] });  

                if (upsertError) {
                        console.error("❌ Supabase Error:", upsertError);
                        alert(`Error saving profile: ${upsertError.message}`);
                        return;
                    }

                    // ✅ Store session in Flask (VERY IMPORTANT)
                    const sessionResponse = await fetch("/set_session", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            role: "freelancer", 
                            full_name: fullName, 
                            id: userId 
                        })
                    });

                    if (!sessionResponse.ok) {
                        alert("Error storing session. Please try again.");
                        return;
                    }

                    console.log("✅ Session Stored Successfully, Redirecting to Freelancer Dashboard...");
                    window.location.href = "/freelancer-dashboard";

                } catch (error) {
                    console.error("❌ Request Failed:", error);
                    alert("Something went wrong. Please try again.");
                }

        });
    </script>

</body>
</html>
